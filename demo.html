<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevAtlas — Learn Tech. Build Cool Stuff. Become Unstoppable 🚀</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              space: ['Space Grotesk', 'sans-serif'],
              display: ['Fredoka', 'sans-serif'],
              sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <!-- React 18 & Babel CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(124, 58, 237, 0.3) transparent;
      }
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-thumb {
        background: rgba(124, 58, 237, 0.3);
        border-radius: 9999px;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glass-card:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(139, 92, 246, 0.3);
      }
      .glass-nav {
        background: rgba(9, 9, 11, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glow-purple {
        box-shadow: 0 0 25px -5px rgba(124, 58, 237, 0.4);
      }
      .gradient-text-purple {
        background: linear-gradient(135deg, #A855F7 0%, #EC4899 50%, #06B6D4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .gradient-text-amber {
        background: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="bg-[#09090B] text-zinc-100 antialiased selection:bg-purple-500/30 selection:text-purple-200">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      function App() {
        const [activeTab, setActiveTab] = useState('dashboard');
        const [streak] = useState(12);
        const [xp, setXp] = useState(3890);
        const [level] = useState(14);

        const triggerConfetti = () => {
          if (window.confetti) {
            window.confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
          }
        };

        return (
          <div className="min-h-screen bg-[#09090B] text-zinc-100">
            {/* Header Navbar */}
            <header className="sticky top-0 z-50 glass-nav">
              <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-purple-600 to-cyan-500 flex items-center justify-center glow-purple">
                    <span className="text-xl">🚀</span>
                  </div>
                  <span className="text-xl font-bold font-space gradient-text-purple">DevAtlas</span>
                </div>

                <nav className="flex items-center gap-2 bg-zinc-900/60 p-1.5 rounded-2xl border border-white/5">
                  {['dashboard', 'roadmaps', 'ai', 'gamification'].map((tab) => (
                    <button
                      key={tab}
                      onClick={() => setActiveTab(tab)}
                      className={`px-4 py-2 rounded-xl font-semibold text-xs capitalize transition-all ${
                        activeTab === tab
                          ? 'text-white bg-purple-600 shadow-lg'
                          : 'text-zinc-400 hover:text-white'
                      }`}
                    >
                      {tab}
                    </button>
                  ))}
                </nav>

                <div className="flex items-center gap-3">
                  <div className="px-3 py-1.5 rounded-xl bg-zinc-900 border border-white/10 text-xs font-semibold flex items-center gap-2">
                    <span className="text-amber-400">🔥 {streak}d</span>
                    <span className="text-purple-400">⚡ {xp} XP</span>
                    <span className="text-cyan-400">🏆 Lvl {level}</span>
                  </div>
                </div>
              </div>
            </header>

            {/* Hero Section */}
            <section className="py-20 px-6 max-w-7xl mx-auto text-center space-y-6">
              <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-300 text-xs font-semibold">
                🔥 Main character energy unlocked • DevAtlas 2.0
              </div>
              <h1 className="text-5xl sm:text-7xl font-extrabold font-space tracking-tight">
                Learn Tech. <span className="gradient-text-purple">Build Cool Stuff.</span> <span className="gradient-text-amber block">Become Unstoppable 🚀</span>
              </h1>
              <p className="text-lg text-zinc-400 max-w-2xl mx-auto">
                Personalized roadmaps, AI guidance, coding challenges and real-world projects—all in one place.
              </p>

              <div className="flex justify-center gap-4 pt-4">
                <button
                  onClick={() => {
                    setActiveTab('roadmaps');
                    triggerConfetti();
                  }}
                  className="px-8 py-4 rounded-2xl bg-gradient-to-r from-purple-600 to-cyan-500 text-white font-bold font-space shadow-xl hover:scale-105 transition-all glow-purple"
                >
                  🚀 Start Learning
                </button>
              </div>
            </section>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
