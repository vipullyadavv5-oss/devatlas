<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevAtlas — Learn Tech. Build Cool Stuff. Become Unstoppable 🚀</title>
    <meta name="description" content="Personalized roadmaps, AI guidance, coding challenges and real-world projects—all in one place." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              space: ['Space Grotesk', 'sans-serif'],
              display: ['Fredoka', 'sans-serif'],
              sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                primary: '#7C3AED',
                purple: '#8B5CF6',
                cyan: '#06B6D4',
                accent: '#F59E0B',
                success: '#22C55E',
                danger: '#EF4444',
                bg: '#09090B',
                card: 'rgba(255, 255, 255, 0.06)',
                border: 'rgba(255, 255, 255, 0.08)',
              }
            }
          }
        }
      }
    </script>

    <style>
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(124, 58, 237, 0.3) transparent;
      }
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: rgba(124, 58, 237, 0.3);
        border-radius: 9999px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: rgba(124, 58, 237, 0.6);
      }

      html, body {
        margin: 0;
        padding: 0;
        background-color: #09090B;
        color: #F4F4F5;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body class="bg-[#09090B] text-zinc-100 antialiased selection:bg-purple-500/30 selection:text-purple-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
