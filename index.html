<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦉</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevAtlas — Your All-in-One Coding Portfolio</title>
    <meta name="description" content="Track your GitHub contributions, LeetCode, Codeforces stats, contest ratings, and DSA questions all in one place." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              space: ['Space Grotesk', 'sans-serif'],
              sans: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              codolio: {
                orange: '#FF7A00',
                orangeHover: '#E66E00',
                bg: '#FAFAFA',
                card: '#FFFFFF',
                border: '#E5E7EB',
                text: '#111827',
                subtext: '#6B7280',
              }
            }
          }
        }
      }
    </script>

    <style>
      * {
        scrollbar-width: thin;
        scrollbar-color: #CBD5E1 transparent;
      }
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 9999px;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #F8FAFC;
        color: #111827;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
